<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>Account Portal</title>
</head>
<body>
    <div id="wrapper">
        
        <header>
            <h1 class="topstring">Account Services</h1>
        </header>

        <main>
            <div class="container">
                <div class="lgn_snp">
                    <button class="login">Login</button>
                    <button class="signup">Sign-up</button>
                </div>

                <form id="submit-to-google-sheets">
                    <div class="form-group">
                        <label for="firstname"><b>First Name</b></label>
                        <input name="firstname" type="text" placeholder="Enter Firstname" id="firstname">
                    </div>

                    <div class="form-group">
                        <label for="lastname"><b>Last Name</b></label>
                        <input name="lastname" type="text" placeholder="Enter Lastname" id="lastname">
                    </div>

                    <div class="error" id="error"></div>

                    <div class="form-group">
                        <label for="username"><b>Username</b></label>
                        <input name="username" type="text" placeholder="Enter Username" id="username" required>
                    </div>

                    <div class="form-group">
                        <label for="password"><b>Password</b></label>
                        <input name="password" type="password" placeholder="Enter Password" id="password" required>
                    </div>

                    <div class="actions">
                        <button type="submit" class="submit">Create Account</button>
                        <button type="submit" class="go">Submit</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            <p>Copyright &copy; 2026 Account Portal</p>
        </footer>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="script.js"></script>
</body>
</html>
