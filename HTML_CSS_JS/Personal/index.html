<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>Account Access</title>
</head>
<body id="body">
    <header>
        <img src="images/istockphoto-1481521952-612x612.jpg" alt="Portal Logo" class="header-logo">
        <h1 class="topstring">JavaJam Account Portal</h1>
    </header>
    
    <div class="container">
        <div class="lgn_snp">
            <button class="login">Login</button>
            <button class="signup">Sign-up</button>
        </div>

        <form id="submit-to-google-sheets">
            <label class="firstname"><b>Firstname</b>
                <input name="firstname" type="text" placeholder="Enter Firstname" id="firstname">
            </label>

            <label class="lastname"><b>Lastname</b>
                <input name="lastname" type="text" placeholder="Enter Lastname" id="lastname">
            </label>

            <div class="error" id="error"></div>

            <label class="username"><b>Username</b>
                <input name="username" type="text" placeholder="Enter Username" id="username" required>
            </label>

            <label class="password"><b>Password</b>
                <input name="password" type="password" placeholder="Enter Password" id="password" required>
            </label>

            <button type="submit" class="submit">Create Account</button>
            <button type="submit" class="go">Submit</button>
        </form>
    </div>
    <footer>
        Copyright &copy; 2025 Amelia Perry
    </footer>
    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        function init() {
            gapi.client.init({
                apiKey: 'AIzaSyBJ0gb7T52mGBXN50AOg1nZoWcogfCmXwY',
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }).then(() => {
                fetchDataFromGoogleSheets();
            }).catch((error) => {
                console.error('Error initializing Google Sheets API:', error);
            });
        }

        function fetchDataFromGoogleSheets() {
            gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: '1UtuNwcnkC_513gyL_HVp3vzXOKynS3HMzXUC4hPKTw8',
                range: 'Login!A1:B5'
            }).then((response) => {
                const values = response.result.values;
                const data = values.map((row) => ({
                    col1: row[0],
                    col2: row[1]
                }));
                console.log(data);
            }).catch((error) => {
                console.error('Error retrieving data from Google Sheets:', error);
            });
        }

        gapi.load('client', init);
    </script>
    <script src="script.js"></script>
</body>
</html>
